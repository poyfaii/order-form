<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Calendar</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0d0d14;
  --surface:rgba(255,255,255,0.04);
  --surface2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.09);
  --border2:rgba(255,255,255,0.16);
  --text:#f0eeff;
  --text2:#9490b8;
  --text3:#4e4a6a;

  --p1:#a78bfa;
  --p2:#f472b6;
  --p3:#34d399;
  --p4:#fbbf24;
  --p5:#60a5fa;

  --grad:linear-gradient(135deg,#a78bfa,#f472b6);
  --r:16px;
  --r-sm:10px;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Sarabun',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(10px);
}

.btn-add-top{
  background:var(--grad);
  border:none;
  padding:8px 16px;
  border-radius:999px;
  color:#fff;
  cursor:pointer;
  transition:.2s;
}
.btn-add-top:hover{transform:scale(1.05);}

/* GRID */
.shell{
  display:grid;
  grid-template-columns:280px 1fr;
  min-height:100vh;
}

/* SIDEBAR */
.sidebar{
  border-right:1px solid var(--border);
  padding:16px;
}

/* STAT */
.stat-card{
  padding:12px;
  border-radius:var(--r-sm);
  background:linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
  border:1px solid var(--border);
  margin-bottom:10px;
  backdrop-filter:blur(12px);
  transition:.25s;
}
.stat-card:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 30px rgba(0,0,0,.5);
}

.stat-n{
  font-size:22px;
  font-weight:800;
}

/* MAIN */
.main{
  padding:20px;
}

/* CALENDAR */
.cal-days{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.cal-cell{
  padding:10px;
  border-radius:10px;
  background:var(--surface);
  border:1px solid var(--border);
  cursor:pointer;
  transition:.2s;
}
.cal-cell:hover{
  border-color:var(--p1);
  box-shadow:0 0 10px rgba(167,139,250,.3);
}

/* MODAL */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:flex;
  align-items:center;
  justify-content:center;
}
.modal{
  background:#13121e;
  padding:20px;
  border-radius:16px;
  width:90%;
  max-width:400px;
}

.f-input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--surface2);
  color:#fff;
}

.btn-save{
  width:100%;
  padding:10px;
  border:none;
  border-radius:999px;
  background:var(--grad);
  color:#fff;
}
</style>
</head>

<body>

<div class="topbar">
  <div>📅 WorkCal</div>
  <button class="btn-add-top" onclick="openModal()">+ เพิ่มงาน</button>
</div>

<div class="shell">

  <div class="sidebar">
    <div class="stat-card">
      <div class="stat-n" id="st-total">0</div>
      <div>ทั้งหมด</div>
    </div>
    <div class="stat-card">
      <div class="stat-n" id="st-done">0</div>
      <div>เสร็จแล้ว</div>
    </div>
  </div>

  <div class="main">
    <div class="cal-days" id="cal-days"></div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" style="display:none;">
  <div class="modal">
    <input id="name" class="f-input" placeholder="ชื่องาน">
    <input id="date" type="date" class="f-input">
    <button class="btn-save" onclick="save()">บันทึก</button>
  </div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")||"[]");

function render(){
  document.getElementById("st-total").textContent = tasks.length;
  document.getElementById("st-done").textContent = tasks.filter(t=>t.done).length;

  const cal = document.getElementById("cal-days");
  cal.innerHTML="";

  for(let i=1;i<=30;i++){
    const d = document.createElement("div");
    d.className="cal-cell";
    d.innerHTML=i;

    const dayTasks = tasks.filter(t=> new Date(t.date).getDate()===i);
    if(dayTasks.length){
      d.style.borderColor="var(--p2)";
    }

    cal.appendChild(d);
  }
}

function openModal(){
  document.getElementById("modal").style.display="flex";
}

function save(){
  const name = document.getElementById("name").value;
  const date = document.getElementById("date").value;

  if(!name) return;

  tasks.push({name,date,done:false});
  localStorage.setItem("tasks",JSON.stringify(tasks));

  document.getElementById("modal").style.display="none";
  render();
}

render();
</script>

</body>
</html>
