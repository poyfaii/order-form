<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkCal Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f0f1a;
  --card:#1b1b2b;
  --border:#2a2a3d;
  --text:#fff;
  --sub:#9aa0c3;
  --main:#a78bfa;
}

*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Sarabun',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* header */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 18px;
  border-bottom:1px solid var(--border);
}

.title{
  font-size:18px;
  font-weight:700;
}

.btn{
  background:var(--main);
  border:none;
  color:#fff;
  padding:8px 16px;
  border-radius:20px;
  cursor:pointer;
}

/* calendar */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  padding:10px;
}

.day{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  min-height:70px;
  padding:6px;
  font-size:12px;
  cursor:pointer;
}

.day:hover{
  border-color:var(--main);
}

.day-num{
  font-weight:700;
  margin-bottom:4px;
}

.task{
  font-size:10px;
  background:#2a2a3d;
  border-radius:6px;
  padding:2px 5px;
  margin-bottom:2px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* modal */
.modal-bg{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal{
  background:var(--card);
  padding:20px;
  border-radius:14px;
  width:90%;
  max-width:400px;
}

.input{
  width:100%;
  margin-bottom:10px;
  padding:8px;
  border-radius:8px;
  border:1px solid var(--border);
  background:#12121f;
  color:#fff;
}

.actions{
  display:flex;
  justify-content:flex-end;
  gap:8px;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="title">📅 WorkCal Pro</div>
  <button class="btn" onclick="openModal()">+ เพิ่มงาน</button>
</div>

<div id="calendar" class="calendar"></div>

<!-- modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <input id="name" class="input" placeholder="ชื่องาน">
    <input id="date" class="input" type="date">
    <div class="actions">
      <button class="btn" onclick="save()">บันทึก</button>
    </div>
  </div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")||"[]");

function saveData(){
  localStorage.setItem("tasks",JSON.stringify(tasks));
}

function render(){
  const cal = document.getElementById("calendar");
  cal.innerHTML="";
  
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth();

  const days = new Date(y,m+1,0).getDate();

  for(let d=1; d<=days; d++){
    const date = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayTasks = tasks.filter(t=>t.date===date);

    const el = document.createElement("div");
    el.className="day";
    el.innerHTML = `
      <div class="day-num">${d}</div>
      ${dayTasks.map(t=>`<div class="task">${t.name}</div>`).join("")}
    `;
    el.onclick=()=>openModal(date);
    cal.appendChild(el);
  }
}

function openModal(date=""){
  document.getElementById("modal").style.display="flex";
  document.getElementById("date").value=date;
}

function save(){
  const name=document.getElementById("name").value;
  const date=document.getElementById("date").value;

  if(!name || !date) return;

  tasks.push({name,date});
  saveData();
  closeModal();
  render();
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

document.getElementById("modal").onclick=(e)=>{
  if(e.target.id==="modal") closeModal();
}

render();
</script>

</body>
</html>
